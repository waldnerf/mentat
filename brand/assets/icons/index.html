<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mentat Icon Library</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  body { font-family: var(--font-body); background: var(--paper); color: var(--ink); margin: 0; padding: var(--space-8) var(--space-5); }
  .wrap { max-width: var(--container); margin: 0 auto; }
  h1 { font-family: var(--font-display); font-size: var(--text-h1); color: var(--charcoal); font-weight: 600; margin: 0 0 var(--space-2); }
  p.lead { color: var(--muted); margin: 0 0 var(--space-7); max-width: var(--measure); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: var(--space-4); }
  .cell { border: var(--border); border-radius: var(--radius); background: var(--surface); padding: var(--space-5) var(--space-3); text-align: center; }
  .cell svg { color: var(--accent-dark); width: 28px; height: 28px; }
  .cell span { display: block; margin-top: var(--space-3); font-size: var(--text-small); color: var(--muted); font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Mentat Icon Library</h1>
  <p class="lead">Outline, geometric, consistent. 24 by 24, 1.75px stroke, currentColor. Icons label concepts, they do not decorate.</p>
  <div class="grid" id="grid"></div>
</div>
<script>
  const names = ["thinking","building","knowledge","ai","governance","framework","concept","principle","architecture","connect","timeline","reuse","callout","search"];
  document.getElementById("grid").innerHTML = names.map(n =>
    `<div class="cell"><svg width="28" height="28" aria-hidden="true"><use href="icons.svg#${n}"></use></svg><span>${n}</span></div>`
  ).join("");
</script>
</body>
</html>
